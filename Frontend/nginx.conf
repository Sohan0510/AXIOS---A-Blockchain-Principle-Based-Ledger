server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: serve API reverse proxy (uncomment if needed)
  # location /api/ {
  #   proxy_pass http://backend:5050/api/;
  #   proxy_set_header Host $host;
  # }
}
